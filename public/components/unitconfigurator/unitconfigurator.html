<div class="configurator-wrapper">
    <div class="row">
        <div class="col s5">
            <button id="button_jobs" class="btn blue s12 left">Jobs</button>
        </div>
        <div class="col s3">
            <button id="button_quests" class="btn green s12">Quests</button>
        </div>
        <div class="col s4">
            <button id="button_lobby" class="btn orange s12 right">Dungeons</button>
        </div>
    </div>
    <div class="row">
        <div class="col s2">
            <span id="unit_info" class="light-green lighten-1"></span><br>
            <div id="unit_icon" class="selection-icon"></div>
            <div>
                <button id="button_previous" class="btn-small purple"
                    style="padding: 4px; line-height: 0; max-height: 20px;">◀</button>
                <b><span id="label_class" class="white-text lighten-1"></span></b>
                <button id="button_next" class="btn-small purple"
                    style="padding: 4px; line-height: 0; max-height: 20px;">▶</button>
            </div><br>
            <span class="light-blue lighten-1">Booty:</span><br>
            <span id="unit_booty" class="white-text" style="padding: 0;"></span><br>
            <span class="light-blue lighten-1">Progress:</span><br>
            <span id="unit_progress" class="white-text" style="padding: 0;"></span><br>
        </div>
        <div class="col s2" style="padding: 0;">
            <span class="light-blue lighten-1">Base attributes:</span><br>
            <span id="label_health" class="white-text">Health: 50</span>
            <button id="button_health" class="btn-plus right">+</button><br>
            <span id="label_stamina" class="white-text">stamina: 50</span>
            <button id="button_stamina" class="btn-plus right">+</button><br>
            <span id="label_mana" class="white-text">mana: 50</span>
            <button id="button_mana" class="btn-plus right">+</button><br>
            <span id="label_action_points" class="white-text">action points: 8</span>
            <br>
            <br>
            <span class="light-blue lighten-1">Attributes:</span><br>
            <span id="label_strength" class="white-text">strength: 50</span>
            <button id="button_strength" class="btn-plus right">+</button><br>
            <span id="label_physique" class="white-text">physique: 50</span>
            <button id="button_physique" class="btn-plus right">+</button><br>
            <span id="label_agility" class="white-text">agility: 50</span>
            <button id="button_agility" class="btn-plus right">+</button><br>
            <span id="label_endurance" class="white-text">endurance: 50</span>
            <button id="button_endurance" class="btn-plus right">+</button><br>
            <span id="label_intelligence" class="white-text">intelligence: 50</span>
            <button id="button_intelligence" class="btn-plus right">+</button><br>
            <span id="label_initiative" class="white-text">initiative: 50</span>
            <button id="button_initiative" class="btn-plus right">+</button><br>
            <span id="label_luck" class="white-text">luck: 50</span>
            <button id="button_luck" class="btn-plus right">+</button><br>
            <br>
            <button id="button_level_up" class="btn-small center orange" style="margin-top: -5px;">Level Up</button>
        </div>
        <div class="col s2">
            <span class="light-blue lighten-1">Resistance:</span><br>
            <span id="unit_resistance" class="white-text" style="padding: 0;"></span>
        </div>
        <div style="margin: 10px;">
            <span class="orange-text lighten-3">
                <img src="./assets/icons/sword-02.png"
                    style="vertical-align: middle; padding-bottom: 4px; width: 24px;" />
                <b>SHOP</b>
                <img src="./assets/icons/shield-02.png"
                    style="vertical-align: middle; padding-bottom: 4px; width: 24px;" />
            </span>
            <button id="button_tab_shop_all" class="btn-small green"
                style="padding: 4px; line-height: 0; max-height: 20px;">all</button>
            <button id="button_tab_shop_weapon" class="btn-small purple"
                style="padding: 4px; line-height: 0; max-height: 20px;">weapon</button>
            <button id="button_tab_shop_ammunition" class="btn-small purple"
                style="padding: 4px; line-height: 0; max-height: 20px;">ammunition</button>
            <button id="button_tab_shop_armor" class="btn-small purple"
                style="padding: 4px; line-height: 0; max-height: 20px;">armor</button>
            <button id="button_tab_shop_magic" class="btn-small purple"
                style="padding: 4px; line-height: 0; max-height: 20px;">magic</button>
            <button id="button_tab_shop_items" class="btn-small purple"
                style="padding: 4px; line-height: 0; max-height: 20px;">items</button>
        </div>
        <div style="height: 335px;">
            <div id="shop_items_container" class="items-container-y col s6 scrollbar-y"
                style="max-height: 324px; padding: 0;"></div>
        </div>
        <span class="green-text lighten-3">
            <img src="./assets/icons/backpack.png" style="vertical-align: middle; padding-bottom: 4px;" />
            <b>INVENTORY</b>
        </span>
        <label class="white-text" style="padding-left: 20px;">
            <input id="checkbox_sell" type="checkbox" />
            <span style="padding-left: 24px;">Sell <img src="./assets/icons/sell-item.png"
                    style="vertical-align: middle; padding-bottom: 4px;" /></span>&nbsp;&nbsp;&nbsp;
        </label>
        <label class="white-text">
            <input id="checkbox_repair" type="checkbox" />
            <span style="padding-left: 24px;">Repair<img src="./assets/icons/repair-item.png"
                    style="vertical-align: middle; padding-bottom: 4px;" /></span>
        </label>
    </div>
    <div id="unit_items_container" class="items-container-x scrollbar-x" style="margin: -3px; margin-top: -20px;"></div>
</div>
<div id="item_description_popup" class="item-description-popup white-text"></div>
<div id="popup_shadow" class="popup-shadow hidden"></div>
<div id="shop_item_popup" class="shop-item-popup blue-grey darken-4 hidden">
    <div class="row">
        <div class="col s5">
            <div id="icon" class="selection-icon"></div><br>
        </div>
        <div class="col s7">
            <span id="label_description" class="orange-text" style="padding: 0;">Buy item?</span><br>
            <span id="label_price" class="white-text" style="padding: 0;">
                <img src="./assets/icons/coin.png" style="width: 9px;" />1000
                <img src="./assets/icons/ruby.png" style="width: 9px;" />15
            </span><br><br>
            <button id="button_yes" class="btn-small green">Yes</button>
            <button id="button_no" class="btn-small red">No</button>
        </div>
    </div>
</div>
